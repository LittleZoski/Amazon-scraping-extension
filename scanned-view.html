<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanned Items Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #222;
      min-height: 100vh;
    }

    .page-header {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .page-header h1 {
      font-size: 20px;
      color: #1a1a1a;
      font-weight: 700;
    }

    .page-header .subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }

    .btn-green  { background: #2e7d32; color: white; }
    .btn-blue   { background: #1565c0; color: white; }
    .btn-red    { background: #c62828; color: white; }
    .btn-gray   { background: #e0e0e0; color: #444; }

    .filters-bar {
      background: white;
      border-bottom: 1px solid #efefef;
      padding: 12px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filters-bar label {
      font-size: 12px;
      color: #666;
      font-weight: 600;
      white-space: nowrap;
    }

    .filters-bar input[type="number"],
    .filters-bar select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      color: #222;
      background: white;
    }

    .filters-bar input[type="number"] { width: 80px; }

    #sellerFilter { min-width: 160px; }
    #sortSelect   { min-width: 160px; }

    .btn-apply {
      padding: 6px 16px;
      background: #0064d2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    #countDisplay {
      font-size: 12px;
      color: #aaa;
      margin-left: 8px;
    }

    .table-wrap {
      padding: 0 24px 24px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-top: 16px;
    }

    thead tr {
      background: #f5f5f5;
    }

    th {
      padding: 12px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap;
    }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }

    tbody tr:hover { background: #f5f8ff; }
    tbody tr:last-child td { border-bottom: none; }

    .thumb {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 5px;
      border: 1px solid #eee;
    }

    .thumb-placeholder {
      width: 56px;
      height: 56px;
      background: #f3f4f6;
      border-radius: 5px;
    }

    .item-title {
      font-weight: 600;
      color: #0064d2;
      text-decoration: none;
      display: block;
      max-width: 380px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .item-title:hover { text-decoration: underline; }

    .item-id {
      font-size: 11px;
      color: #ccc;
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 12px;
    }

    .badge-sold    { background: #e8f5e9; color: #2e7d32; }
    .badge-watch   { background: #e3f2fd; color: #1565c0; }
    .badge-zero    { background: #f5f5f5; color: #aaa; }

    .link-btn {
      display: inline-block;
      padding: 4px 12px;
      background: #f0f0f0;
      color: #555;
      text-decoration: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .link-btn:hover { background: #e0e0e0; }

    .del-btn {
      padding: 4px 10px;
      background: none;
      border: 1px solid #f0f0f0;
      border-radius: 5px;
      color: #ef4444;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .del-btn:hover { background: #fef2f2; }

    .empty-state {
      text-align: center;
      padding: 80px 0;
      color: #aaa;
      font-size: 16px;
    }

    .seller-tag {
      font-size: 11px;
      background: #f3f4f6;
      color: #555;
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
    }

    .date-cell {
      font-size: 11px;
      color: #aaa;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>Scanned Items Viewer</h1>
    <div class="subtitle" id="headerSubtitle">Loading...</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-green" id="exportJsonBtn">Export JSON</button>
    <button class="btn btn-blue" id="exportCsvBtn">Export CSV</button>
    <button class="btn btn-red" id="clearAllBtn">Clear All</button>
  </div>
</div>

<div class="filters-bar">
  <label>Seller:</label>
  <select id="sellerFilter">
    <option value="">All Sellers</option>
  </select>

  <label>Min Sold:</label>
  <input type="number" id="minSold" value="0" min="0">

  <label>Min Watching:</label>
  <input type="number" id="minWatching" value="0" min="0">

  <label>Sort:</label>
  <select id="sortSelect">
    <option value="sold-desc">Most Sold</option>
    <option value="sold-asc">Least Sold</option>
    <option value="watching-desc">Most Watching</option>
    <option value="watching-asc">Least Watching</option>
    <option value="date-desc">Newest Scan</option>
    <option value="date-asc">Oldest Scan</option>
    <option value="price-asc">Price Low→High</option>
    <option value="price-desc">Price High→Low</option>
  </select>

  <button class="btn-apply" id="applyFiltersBtn">Apply Filters</button>
  <span id="countDisplay"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:68px;"></th>
        <th>Title</th>
        <th style="width:120px;">Seller</th>
        <th style="width:110px;">Price</th>
        <th style="width:90px;text-align:center;">Sold</th>
        <th style="width:100px;text-align:center;">Watching</th>
        <th style="width:130px;text-align:center;">Scanned</th>
        <th style="width:110px;text-align:center;">Links</th>
        <th style="width:140px;text-align:center;">Amazon</th>
        <th style="width:70px;text-align:center;"></th>
      </tr>
    </thead>
    <tbody id="resultsBody">
      <tr><td colspan="10" class="empty-state">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script src="scanned-view.js"></script>
</body>
</html>
